kind = "web"
previewPath = "/"
title = "React Mastery"
version = "1.0.0"
id = "artifacts/react-mastery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23235

[services.development]
run = "pnpm --filter @workspace/react-mastery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/react-mastery", "run", "build" ]
publicDir = "artifacts/react-mastery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23235"
BASE_PATH = "/"
